<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Personal Color</title>
    <meta name="google-site-verification" content="TW7l1P1SIjiAjuRTz8jUIFztgIoJbLwDNrsLHJTykyY" />

    <!-- This page only redirects by browser language and has no indexable content of its own,
         so it is kept out of the index while still pointing crawlers to the real language pages. -->
    <meta name="robots" content="noindex, follow">

    <link rel="alternate" hreflang="ko" href="https://findyourpersonalcolor.com/ko/">
    <link rel="alternate" hreflang="en" href="https://findyourpersonalcolor.com/en/">
    <link rel="alternate" hreflang="ja" href="https://findyourpersonalcolor.com/ja/">
    <link rel="alternate" hreflang="es" href="https://findyourpersonalcolor.com/es/">
    <link rel="alternate" hreflang="zh" href="https://findyourpersonalcolor.com/zh/">
    <link rel="alternate" hreflang="de" href="https://findyourpersonalcolor.com/de/">
    <link rel="alternate" hreflang="pt" href="https://findyourpersonalcolor.com/pt/">
    <link rel="alternate" hreflang="x-default" href="https://findyourpersonalcolor.com/en/">

    <!-- Fallback for crawlers/browsers that don't run the redirect script -->
    <noscript>
        <meta http-equiv="refresh" content="0; url=https://findyourpersonalcolor.com/en/">
    </noscript>

    <script>
        var lang = navigator.language || navigator.userLanguage;
        lang = lang.toLowerCase();
        if (lang.indexOf('ko') !== -1) {
            window.location.href = '/ko/';
        } else if (lang.indexOf('ja') !== -1) {
            window.location.href = '/ja/';
        } else if (lang.indexOf('es') !== -1) {
            window.location.href = '/es/';
        } else if (lang.indexOf('zh') !== -1) {
            window.location.href = '/zh/';
        } else if (lang.indexOf('de') !== -1) {
            window.location.href = '/de/';
        } else if (lang.indexOf('pt') !== -1) {
            window.location.href = '/pt/';
        } else {
            window.location.href = '/en/';
        }
    </script>

    <style>
    /* CSS Injection - Responsive Layout */
    * { box-sizing: border-box; }
    .container {
        max-width: 1200px !important;
        width: 92% !important;
        margin: 0 auto !important;
        padding: 0 15px !important;
    }

    .main-layout-grid {
        display: grid !important;
        grid-template-columns: 1.1fr 0.9fr !important;
        gap: 40px !important;
        margin: 30px auto !important;
        align-items: start !important;
    }

    @media (max-width: 950px) {
        .main-layout-grid {
            grid-template-columns: 1fr !important;
            gap: 25px !important;
        }
    }

    .card {
        width: 100% !important;
        margin-bottom: 20px !important;
        padding: 30px !important;
        border-radius: 14px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important;
        background: #ffffff !important;
    }
    #quiz-container { margin-top: 0 !important; }
    </style>
    <!-- Google tag (gtag.js) with Consent Mode v2 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MRBJH5C8SZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied',
        'wait_for_update': 500
      });
      gtag('js', new Date());
      gtag('config', 'G-MRBJH5C8SZ');
    </script>
</head>
<body>
    <p>Redirecting based on your browser language&hellip; If it doesn't work, choose a language:
        <a href="/en/">English</a> ·
        <a href="/ko/">한국어</a> ·
        <a href="/ja/">日本語</a> ·
        <a href="/es/">Español</a> ·
        <a href="/zh/">中文</a> ·
        <a href="/de/">Deutsch</a> ·
        <a href="/pt/">Português</a>
    </p>
    <div id="consent-banner" class="consent-banner">
        <div class="consent-banner-inner">
            <p>This site uses cookies to improve your experience. <a href="/en/privacy.html">Learn more</a></p>
            <div class="consent-banner-btns">
                <button id="consent-reject" class="consent-btn consent-btn-secondary">Reject</button>
                <button id="consent-accept" class="consent-btn consent-btn-primary">Accept</button>
            </div>
        </div>
    </div>
    <style>
        .consent-banner{position:fixed;left:0;right:0;bottom:0;z-index:9999;background:var(--card,#FBF9F4);border-top:1px solid var(--border,rgba(43,36,32,0.12));padding:16px 20px;display:none;box-shadow:0 -4px 20px rgba(0,0,0,0.08);}
        .consent-banner.show{display:block;}
        .consent-banner-inner{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;}
        .consent-banner p{margin:0;font-size:0.85rem;color:var(--ink-soft,#6E6156);flex:1;min-width:220px;}
        .consent-banner a{color:var(--brand,#6B3F4D);text-decoration:underline;}
        .consent-banner-btns{display:flex;gap:10px;flex-shrink:0;}
        .consent-btn{padding:9px 18px;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
        .consent-btn-primary{background:var(--ink,#2B2420);color:var(--canvas,#F3EFE6);}
        .consent-btn-secondary{background:transparent;color:var(--ink-soft,#6E6156);border:1px solid var(--border-strong,rgba(43,36,32,0.22));}
    </style>
    <script>
    (function(){
        var KEY = 'cookie_consent';
        var saved = localStorage.getItem(KEY);
        function updateConsent(granted){
            gtag('consent', 'update', {
                'ad_storage': granted ? 'granted' : 'denied',
                'ad_user_data': granted ? 'granted' : 'denied',
                'ad_personalization': granted ? 'granted' : 'denied',
                'analytics_storage': granted ? 'granted' : 'denied'
            });
        }
        if (saved === 'granted') { updateConsent(true); }
        else if (saved === 'denied') { updateConsent(false); }
        else {
            var b = document.getElementById('consent-banner');
            if (b) b.classList.add('show');
        }
        var acceptBtn = document.getElementById('consent-accept');
        var rejectBtn = document.getElementById('consent-reject');
        if (acceptBtn) acceptBtn.addEventListener('click', function(){
            localStorage.setItem(KEY, 'granted');
            updateConsent(true);
            document.getElementById('consent-banner').classList.remove('show');
        });
        if (rejectBtn) rejectBtn.addEventListener('click', function(){
            localStorage.setItem(KEY, 'denied');
            updateConsent(false);
            document.getElementById('consent-banner').classList.remove('show');
        });
    })();
    </script>
</body>
</html>
