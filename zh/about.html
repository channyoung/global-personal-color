<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>关于 PaletteTone</title>
    <link rel="stylesheet" href="../style.css">

    <style>
    /* CSS Injection - Responsive Layout */
    * { box-sizing: border-box; }
    .container {
        max-width: 1200px !important;
        width: 92% !important;
        margin: 0 auto !important;
        padding: 0 15px !important;
    }
    
    .main-layout-grid {
        display: grid !important;
        grid-template-columns: 1.1fr 0.9fr !important;
        gap: 40px !important;
        margin: 30px auto !important;
        align-items: start !important;
    }
    
    @media (max-width: 950px) {
        .main-layout-grid {
            grid-template-columns: 1fr !important;
            gap: 25px !important;
        }
    }
    
    .card {
        width: 100% !important;
        margin-bottom: 20px !important;
        padding: 30px !important;
        border-radius: 14px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important;
        background: #ffffff !important;
    }
    #quiz-container { margin-top: 0 !important; }
    </style>

</head>
<body>
    <main class="container card" style="margin-top:20px; padding:40px;">
        <h2>关于 PaletteTone</h2>
        <p style="line-height:1.7; color:#444;">PaletteTone 旨在帮助用户诊断自己的个人色彩并获得穿搭灵感。我们的目标是通过数据驱动的分析，为您的日常生活增添一份美好。</p>
        <a href="/zh/" class="btn">Back Home</a>
    </main>
</body>
</html>
