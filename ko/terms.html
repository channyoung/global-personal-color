<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이용약관 - PaletteTone</title>
    <link rel="stylesheet" href="../style.css">

    <style>
    /* CSS Injection - Responsive Layout */
    * { box-sizing: border-box; }
    .container {
        max-width: 1200px !important;
        width: 92% !important;
        margin: 0 auto !important;
        padding: 0 15px !important;
    }
    
    .main-layout-grid {
        display: grid !important;
        grid-template-columns: 1.1fr 0.9fr !important;
        gap: 40px !important;
        margin: 30px auto !important;
        align-items: start !important;
    }
    
    @media (max-width: 950px) {
        .main-layout-grid {
            grid-template-columns: 1fr !important;
            gap: 25px !important;
        }
    }
    
    .card {
        width: 100% !important;
        margin-bottom: 20px !important;
        padding: 30px !important;
        border-radius: 14px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important;
        background: #ffffff !important;
    }
    #quiz-container { margin-top: 0 !important; }
    </style>

</head>
<body>
    <header>
        <div class="container"><h1><a href="/ko/">PaletteTone</a></h1></div>
    </header>
    <main class="container card" style="margin-top:20px; padding:40px;">
        <h2>이용약관</h2>
        <p style="line-height:1.8; color:#333;">본 사이트에서 제공하는 모든 진단 결과는 참고용이며, 의학적 또는 전문적인 판단을 대체할 수 없습니다. 이용자는 본 서비스 이용 시 타인의 권리를 침해하지 않아야 합니다.</p>
        <a href="/ko/" class="btn" style="margin-top:20px; display:inline-block;">Go Back Home</a>
    </main>
    <footer style="margin-top:40px; text-align:center; padding:20px;">
        <p>개인정보처리방침 | 이용약관 | 문의하기</p>
    </footer>
</body>
</html>
