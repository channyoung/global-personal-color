<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>About Find Your Personal Color</title>
    <link rel="stylesheet" href="../style.css">
    <style>

    .card { width: 100% !important; margin-bottom: 20px !important; padding: 30px !important; border-radius: 14px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important; background: #ffffff !important; }
    </style>
</head>
<body>
    <main class="container card" style="margin-top:20px; padding:40px;">
        <h2>About Find Your Personal Color</h2>
        <p style="line-height:1.7; color:#444;">Find Your Personal Color fue creado para ayudar a los usuarios a diagnosticar sus propios colores y obtener ideas sobre estilismo. Nuestro objetivo es aportar un poco de alegría a la vida cotidiana a través del análisis basado en datos.</p>
        <a href="/es/" class="btn">Volver al Inicio</a>
    </main>
